name: Site Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files
        run: |
          for file in index.html styles.css README.md SECURITY.md LICENSE 404.html robots.txt sitemap.xml .gitignore; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done

      - name: Scan for forbidden public strings
        run: |
          if grep -RniE '\bcursor\b|\bclaude\b|\bchatgpt\b|\bgemini\b|\bcopilot\b|\bopenai\b|master prompt|prompt artifact|trusted access|paste into cursor|required from cursor|ai-generated|generated by' \
            --include='*.html' --include='*.md' --include='*.css' --exclude='styles.css' .; then
            echo "Forbidden string found in public files"
            exit 1
          fi

      - name: Serve site and verify responses
        run: |
          python3 -m http.server 8080 &
          sleep 2
          for path in / /robots.txt /sitemap.xml /404.html /LICENSE /SECURITY.md /README.md; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8080${path}")
            if [ "$code" != "200" ]; then
              echo "Unexpected HTTP $code for $path"
              exit 1
            fi
          done
